<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml'>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <!-- 【优化】移动端视口设置，禁止缩放但保留XR内部手势 -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>KeyShotXR</title>
    <style type="text/css">
      html, body { 
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed; /* 防止移动端滚动 */
        -ms-touch-action: pan-y pinch-zoom; /* 允许触摸板双指缩放 */
        touch-action: pan-y pinch-zoom; 
      }
      #KeyShotXR {
        width: 100vw;
        height: 100vh;
        touch-action: none; /* XR内部手势由JS处理 */
        position: absolute;
        top: 0;
        left: 0;
      }
      /* 确保全屏显示 */
      body {
        background-color: #000000;
      }
    </style>
    <script type="text/javascript" src="01.6/files/KeyShotXR.js"></script>
    <script type="text/javascript">
      var keyshotXR;

      function initKeyShotXR() {
        var nameOfDiv = "KeyShotXR";
        var folderName = "01.6";
        var viewPortWidth = 1214;
        var viewPortHeight = 759;
        var backgroundColor = "#000000";
        var uCount = 36;
        var vCount = 1;
        var uWrap = true;
        var vWrap = false;
        var uMouseSensitivity = -0.05;
        var vMouseSensitivity = 1;
        var uStartIndex = 18;
        var vStartIndex = 0;
        
        // 设置缩放范围
        var minZoom = 0.5;  // 最小可缩放到 50%
        var maxZoom = 3;    // 最大可放大到 300%
        
        var rotationDamping = 0.96;
        var downScaleToBrowser = true;
        var addDownScaleGUIButton = false;
        var downloadOnInteraction = false;
        var imageExtension = "webp";
        var showLoading = true;
        var loadingIcon = "ks_logo.png";
        var allowFullscreen = true;
        var uReverse = false;
        var vReverse = false;
        var hotspots = {};
        var isIBooksWidget = false;
        
        keyshotXR = new keyshotXR(nameOfDiv,folderName,viewPortWidth,viewPortHeight,backgroundColor,uCount,vCount,uWrap,vWrap,uMouseSensitivity,vMouseSensitivity,uStartIndex,vStartIndex,minZoom,maxZoom,rotationDamping,downScaleToBrowser,addDownScaleGUIButton,downloadOnInteraction,imageExtension,showLoading,loadingIcon,allowFullscreen,uReverse,vReverse,hotspots,isIBooksWidget);
        
        // 强制全屏显示
        setTimeout(function() {
          if (keyshotXR && keyshotXR.v) {
            keyshotXR.v(true); // 确保全屏模式
          }
        }, 100);
      }

      window.onload = initKeyShotXR;
      
      // 处理横屏/竖屏变化
      window.addEventListener('orientationchange', function() {
        setTimeout(function() {
          if (keyshotXR && keyshotXR.Ua) {
            keyshotXR.Ua(window.innerWidth, window.innerHeight);
          }
        }, 100);
      });
    </script>
  </head>
  <body oncontextmenu="return false;">
    <div id="KeyShotXR"></div>
  </body>
</html>
