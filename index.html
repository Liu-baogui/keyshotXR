<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml'>
<head>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KeyShotXR - 完美移动版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            background: #000;
            touch-action: none;
        }
        #KeyShotXR {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            touch-action: none;
            background: #000;
        }
        #KeyShotXR > div {
            width: 100% !important;
            height: 100% !important;
            position: absolute !important;
            top: 0 !important;
            left: 0 !important;
        }
    </style>
    <script type="text/javascript" src="01.6/files/KeyShotXR.js"></script>
    <script>
        var keyshotXR;
        function initKeyShotXR() {
            keyshotXR = new keyshotXR(
                "KeyShotXR", "01.6", 1214, 759, "#000000",
                36, 1, true, false, -0.05, 1, 18, 0,
                0.5, 3, 0.96, true, false, false, "webp",
                true, "ks_logo.png", true, false, false, {}, false
            );
        }
        window.onload = initKeyShotXR;
        window.addEventListener('resize', function() {
            if(keyshotXR && keyshotXR.Ua) setTimeout(function(){ keyshotXR.Ua(window.innerWidth, window.innerHeight); }, 50);
        });
        window.addEventListener('orientationchange', function() {
            if(keyshotXR && keyshotXR.Ua) setTimeout(function(){ keyshotXR.Ua(window.innerWidth, window.innerHeight); }, 100);
        });
    </script>
</head>
<body oncontextmenu="return false;">
    <div id="KeyShotXR"></div>
</body>
</html>
