<!DOCTYPE html>
<html xmlns='http://www.w3.org/1999/xhtml'>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=Edge"/>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <!-- 移动端优化视口设置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>KeyShotXR - 移动优化版</title>
    <style type="text/css">
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      
      html, body { 
        width: 100%;
        height: 100%;
        overflow: hidden;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #000000;
        -ms-touch-action: pan-y pinch-zoom;
        touch-action: pan-y pinch-zoom;
      }
      
      #KeyShotXR {
        width: 100%;
        height: 100%;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        touch-action: none;
        background-color: #000000;
      }
      
      /* 确保所有容器都填满 */
      #KeyShotXR > div {
        width: 100% !important;
        height: 100% !important;
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
      }
      
      /* 隐藏滚动条 */
      ::-webkit-scrollbar {
        display: none;
      }
    </style>
    <script type="text/javascript" src="01.6/files/KeyShotXR.js"></script>
    <script type="text/javascript">
      var keyshotXR;
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

      function initKeyShotXR() {
        var nameOfDiv = "KeyShotXR";
        var folderName = "01.6";
        var viewPortWidth = 1214;
        var viewPortHeight = 759;
        var backgroundColor = "#000000";
        var uCount = 36;
        var vCount = 1;
        var uWrap = true;
        var vWrap = false;
        var uMouseSensitivity = -0.05;
        var vMouseSensitivity = 1;
        var uStartIndex = 18;
        var vStartIndex = 0;
        
        // 移动端使用更合适的缩放范围
        var minZoom = isMobile ? 0.8 : 0.5;
        var maxZoom = isMobile ? 3 : 3;
        
        var rotationDamping = 0.96;
        var downScaleToBrowser = true;
        var addDownScaleGUIButton = false;
        var downloadOnInteraction = false;
        var imageExtension = "webp";
        var showLoading = true;
        var loadingIcon = "ks_logo.png";
        var allowFullscreen = true;
        var uReverse = false;
        var vReverse = false;
        var hotspots = {};
        var isIBooksWidget = false;
        
        keyshotXR = new keyshotXR(
          nameOfDiv, folderName, viewPortWidth, viewPortHeight, 
          backgroundColor, uCount, vCount, uWrap, vWrap, 
          uMouseSensitivity, vMouseSensitivity, uStartIndex, vStartIndex,
          minZoom, maxZoom, rotationDamping, downScaleToBrowser, 
          addDownScaleGUIButton, downloadOnInteraction, imageExtension, 
          showLoading, loadingIcon, allowFullscreen, uReverse, vReverse, 
          hotspots, isIBooksWidget
        );
        
        // 强制进入全屏模式
        setTimeout(function() {
          if (keyshotXR && keyshotXR.v) {
            keyshotXR.v(true);
            // 重置视图
            if (keyshotXR.Ua) {
              keyshotXR.Ua(window.innerWidth, window.innerHeight);
            }
          }
        }, 50);
      }

      // 页面加载完成后初始化
      window.onload = function() {
        initKeyShotXR();
      };
      
      // 处理横竖屏切换
      window.addEventListener('resize', function() {
        if (keyshotXR && keyshotXR.Ua) {
          setTimeout(function() {
            keyshotXR.Ua(window.innerWidth, window.innerHeight);
          }, 50);
        }
      });
      
      window.addEventListener('orientationchange', function() {
        if (keyshotXR && keyshotXR.Ua) {
          setTimeout(function() {
            keyshotXR.Ua(window.innerWidth, window.innerHeight);
          }, 100);
        }
      });
      
      // 阻止默认手势
      document.addEventListener('touchmove', function(e) {
        if (e.target.closest('#KeyShotXR')) {
          e.preventDefault();
        }
      }, { passive: false });
    </script>
  </head>
  <body oncontextmenu="return false;">
    <div id="KeyShotXR"></div>
  </body>
</html>
